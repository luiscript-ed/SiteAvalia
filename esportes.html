 let jogoAtual = avaliacoes[jogo];

 if(jogoAtual.total > 0) {
  let media = (jogoAtual.soma / jogoAtual.total).toFixed(1);
  document.getElementById("estr").innerText =
   " Média: " + media + " (" + jogoAtual.total + " avaliações)";
 } else {
  document.getElementById("estr").innerText =
   "Ainda não avaliado";
 }
}
let nota=0

function avaliar(n){
nota=n
let estrelas=document.getElementById("estrelas").children

for(let i=0;i<estrelas.length;i++){
estrelas[i].innerText=i<n?"★":"☆"
}

notaSelecionada.innerText="Nota: "+n
}

function enviarAvaliacao(){
let comentario=document.getElementById("comentario").value

if(nota===0){alert("Escolha nota");return}
if(comentario===""){alert("Digite comentário");return}

let j=avaliacoes[AtualJg]

j.soma+=nota
j.total++

let media=(j.soma/j.total).toFixed(1)

estr.innerText="Média: "+media+" ("+j.total+")"

resposta.innerText="Enviado! Nota "+nota

nota=0
comentario.value=""
notaSelecionada.innerText="Nenhuma"

let estrelas=document.getElementById("estrelas").children
for(let i=0;i<estrelas.length;i++){
estrelas[i].innerText="☆"
}
}
